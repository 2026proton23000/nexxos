<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <link rel="apple-touch-icon" sizes="180x180" href="assets/images/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="assets/images/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="assets/images/favicon-16x16.png">
    <link rel="manifest" href="assets/images/site.webmanifest">
    <meta name="msapplication-TileColor" content="#0b1e2f">
    <meta name="theme-color" content="#0b1e2f">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEXXOS - Contact</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <!-- Styles supplémentaires pour le formulaire (à intégrer dans style.css si besoin) -->
    <style>
        .contact-form {
            background: rgba(255,255,255,0.03);
            border-radius: 32px;
            padding: 40px;
            border: 1px solid rgba(255,127,42,0.2);
            margin-bottom: 60px;
        }
        .form-group {
            margin-bottom: 24px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: rgba(255,255,255,0.8);
            font-weight: 500;
        }
        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 12px 16px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,127,42,0.3);
            border-radius: 12px;
            color: white;
            font-size: 1rem;
            transition: border-color 0.2s;
        }
        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #ff7f2a;
        }
        .form-group select option {
            background: #0b1e2f;
            color: white;
        }
        .map-container {
            margin-top: 60px;
        }
        .map-container iframe {
            width: 100%;
            height: 400px;
            border-radius: 24px;
            border: 1px solid rgba(255,127,42,0.2);
        }
    </style>
</head>
<body>
    <!-- Placeholder pour le header -->
    <div id="header-placeholder"></div>

    <main>
        <section class="hero" style="padding-bottom: 40px;">
            <div class="container">
                <h1 data-i18n="menu_contact">Contact</h1>
            </div>
        </section>

        <section class="challenges" style="padding-top: 0;">
            <div class="container">
                <!-- Formulaire de contact -->
                <form id="contact-form" class="contact-form">
                    <div class="form-group">
                        <label for="nom" data-i18n="form_name">Nom</label>
                        <input type="text" id="nom" name="nom" required>
                    </div>
                    <div class="form-group">
                        <label for="email" data-i18n="form_email">Email</label>
                        <input type="email" id="email" name="email" required>
                    </div>
                    <div class="form-group">
                        <label for="telephone" data-i18n="form_phone">Téléphone</label>
                        <input type="tel" id="telephone" name="telephone" required>
                    </div>
                    <div class="form-group">
                        <label for="service" data-i18n="form_service">Service souhaité</label>
                        <select id="service" name="service">
                            <option value="hauteur" data-i18n="service_option1">Travaux en hauteur</option>
                            <option value="maintenance" data-i18n="service_option2">Maintenance intégrale</option>
                            <option value="reparations" data-i18n="service_option3">Réparations spécialisées</option>
                            <option value="gestion" data-i18n="service_option4">Gestion de projets</option>
                            <option value="autre" data-i18n="service_option5">Autre</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="message" data-i18n="form_message">Message</label>
                        <textarea id="message" name="message" rows="5" required></textarea>
                    </div>
                    <button type="submit" class="cta-button" style="width: 100%;" data-i18n="form_send">Envoyer</button>
                </form>

                <!-- Carte Google Maps (placeholder) -->
                <div class="map-container">
                    <h2 style="margin-bottom: 20px;" data-i18n="map_title">Notre localisation</h2>
                    <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3657.123456789!2d-70.3987654!3d-23.6509876!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x0%3A0x0!2zMjPCszM5JzAzLjUiUyA3MMKwMjQnMDAuMCJX!5e0!3m2!1sfr!2sfr!4v1234567890" allowfullscreen="" loading="lazy"></iframe>
                </div>
            </div>
        </section>
    </main>

    <!-- Placeholder pour le footer -->
    <div id="footer-placeholder"></div>

    <!-- Bouton WhatsApp flottant -->
    <a href="#" class="whatsapp-float" id="whatsapp-btn">
        <i class="fab fa-whatsapp"></i>
    </a>

    <!-- Scripts -->
    <script src="js/components/header.js"></script>
    <script src="js/components/footer.js"></script>
    <script src="js/i18n.js"></script>
    <script src="js/whatsapp.js"></script>
    <script src="js/googlesheet.js"></script>
    <script src="js/telegram.js"></script>
    <script src="js/contact.js"></script>
    <script src="js/main.js"></script>
    <script>
        // Initialisation du header et footer
        loadHeader();
        loadFooter();
    </script>
</body>
</html>
